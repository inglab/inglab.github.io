<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    {%- if page.title -%}{{ page.title }} &mdash; {%- endif -%}
    {{ site.title }}
  </title>
  <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

<header class="site-header">
  <div class="nav-inner">
    <a class="nav-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <nav aria-label="Main navigation">
      <ul class="nav-menu">
        {% for item in site.nav %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.title }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>

<main class="page-content">
  {{ content }}
</main>

<footer class="site-footer">
  <p>
    ING Lab @ SKKU &middot;
    <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
  </p>
</footer>

</body>
</html>
